<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diego's World - Coming Soon</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 1rem 0;
            text-align: center;
        }

        header h1 {
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        nav ul {
            list-style: none;
        }

        nav ul li {
            display: inline;
            margin: 0 15px;
        }

        nav ul li a {
            color: #ecf0f1;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #3498db;
        }

        /* Coming Soon Specific Styles */
        .coming-soon-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 3rem 20px;
        }

        .coming-soon-container h2 {
            font-size: 3rem;
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        
        .coming-soon-container p {
            font-size: 1.2rem;
            color: #7f8c8d;
            margin-bottom: 2rem;
        }

        /* Interactive Gear Animation */
        .gear-wrapper {
            width: 150px;
            height: 150px;
            cursor: pointer;
            margin: 0 auto;
        }

        .gear {
            width: 100%;
            height: 100%;
            fill: #3498db;
            animation: spin 8s linear infinite;
            transition: fill 0.3s ease;
        }

        /* Hover speeds it up and changes color */
        .gear-wrapper:hover .gear {
            fill: #e74c3c;
            animation: spin 2.5s linear infinite;
        }

        /* Clicking and holding speeds it up even more */
        .gear-wrapper:active .gear {
            fill: #27ae60;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        footer {
            background-color: #2c3e50;
            color: #bdc3c7;
            text-align: center;
            padding: 1.5rem 0;
            width: 100%;
        }
        
        @media (max-width: 480px) {
            nav ul li {
                display: block;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>DIEGO's WORLD</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="coming-soon.html">Shop</a></li>
                <li><a href="coming-soon.html">About Us</a></li>
                <li><a href="coming-soon.html">🛒 Cart (0)</a></li>
            </ul>
        </nav>
    </header>

    <main class="coming-soon-container">
        <h2>We Will Be Back Soon</h2>

    <footer>

</body>
</html>
